version: '3.8'

services:
  # Code Sandbox Service
  sandbox:
    build:
      context: .
      dockerfile: Dockerfile
    image: ai-learning-sandbox:latest
    container_name: ai-learning-sandbox
    ports:
      - "8000:8000"
    volumes:
      # Docker socket for container management (required for sandbox isolation)
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=INFO
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    # Resource limits for the sandbox service itself
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    # Security options
    security_opt:
      - no-new-privileges:true
    # Logging
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Optional: Nginx reverse proxy for production
  nginx:
    image: nginx:alpine
    container_name: ai-learning-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - sandbox
    restart: unless-stopped
    profiles:
      - production

# Named volumes (if needed for persistence)
volumes:
  sandbox-data:
    driver: local
